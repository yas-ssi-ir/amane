[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function call in default arguments (FastAPI Depends)
    "N803",   # argument name should be lowercase (FastAPI conventions)
    "UP007",  # use X | Y for union type (Python 3.9 compat)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101"]  # assert autorisé dans les tests

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
